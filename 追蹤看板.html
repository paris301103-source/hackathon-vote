function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function extraKeys(){const s=new Set();Object.values(PERM).forEach(c=>{(c.editors||[]).forEach(k=>s.add(k));(c.viewers||[]).forEach(k=>s.add(k));if(c.pm)s.add(c.pm);});PEOPLE.forEach(p=>s.delete(p.k));return [...s];}
function extraPeople(){return extraKeys().map(k=>({k:k,name:k,role:"collab",extra:true}));}
function allPeople(){return PEOPLE.concat(extraPeople());}
function person(k){return allPeople().find(p=>p.k===k)}
function pmOf(p){const t=TRACK[p.id]||{};return t.handler||(PERM[p.id]&&PERM[p.id].pm)||"";}
function pmLabel(p){if(p.team)return p.team.map(k=>person(k)?person(k).name:k).join("·");const k=pmOf(p);return k?(person(k)?person(k).name:k):"未指派";}
function stMeta(s){return STATUS.find(x=>x[0]===s)||STATUS[0]}
function decMeta(d){return DECIDE.find(x=>x[0]===d)||DECIDE[0]}
function cvar(v){return getComputedStyle(document.documentElement).getPropertyValue(v)||"#888"}
function pinFor(k){return (PINS&&PINS[k])||DEFAULT_PINS[k]||"8888";}
function weekKey(d){d=d?new Date(d):new Date();const t=new Date(d);const g=t.getDay();let off;if(g===0)off=1;else if(g===6)off=2;else off=-((g+6)%7);t.setDate(t.getDate()+off);t.setHours(0,0,0,0);return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");}
function weekLabel(k){const a=k.split("-").map(Number);const s=new Date(a[0],a[1]-1,a[2]);const e=new Date(s);e.setDate(e.getDate()+4);return (s.getMonth()+1)+"/"+s.getDate()+"–"+(e.getMonth()+1)+"/"+e.getDate()+"（一～五）";}
function editorsOf(p){const c=PERM[p.id]||{};const t=TRACK[p.id]||{};const arr=[...(c.editors||[])];if(t.handler)arr.push(t.handler);if(c.pm)arr.push(c.pm);return [...new Set(arr.filter(Boolean))];}
function viewersOf(p){const c=PERM[p.id];return (c&&c.viewers)?c.viewers:[];}
function canEdit(p){if(!me)return false;if(me.role==="lead"||me.role==="mgr")return true;if(me.role==="punk")return false;return editorsOf(p).includes(me.k);}
function canView(p){if(!me)return false;if(me.role==="lead"||me.role==="exec"||me.role==="mgr"||me.role==="punk"||me.role==="admin")return true;if(SECTEAM&&SECTEAM.indexOf(me.k)>=0)return true;return editorsOf(p).includes(me.k)||viewersOf(p).includes(me.k);}
function myProjects(){return PROJECTS.filter(canView)}
function isActive(k){const p=person(k);if(!p)return false;if(["exec","mgr","admin","punk","lead"].indexOf(p.role)>=0)return true;if(SECTEAM&&SECTEAM.indexOf(k)>=0)return true;if(PINS&&PINS[k])return true;for(var i=0;i<PROJECTS.length;i++){var pr=PROJECTS[i];if(editorsOf(pr).indexOf(k)>=0||viewersOf(pr).indexOf(k)>=0)return true;}return false;}
function todayKey(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function monthKey(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function reportedToday(t){return t&&t.reportedDate===todayKey();}
function fmt(ts){try{const d=ts.toDate?ts.toDate():new Date(ts);return (d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}catch(e){return""}}

function hashPw(pw){return crypto.subtle.digest("SHA-256",new TextEncoder().encode("bxhk9::"+pw)).then(b=>Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join(""));}
async function doLogin(){if(!pending){document.getElementById("lerr").textContent="請先選擇你的名字";return;}if(!isActive(pending)){document.getElementById("lerr").textContent="此帳號尚未開通，請先由 RAE 指派或後台開通";return;}const pw=document.getElementById("pw").value.trim();const stored=(PINS&&PINS[pending])||"";const h=await hashPw(pw);let ok=false,isDefault=false,legacy=false;if(!stored){ok=(pw==="8888");isDefault=true;}else if(stored===h){ok=true;}else if(stored===pw){ok=true;legacy=true;}else if(stored==="8888"){ok=(pw==="8888");isDefault=true;}if(!ok){document.getElementById("lerr").textContent="密碼錯誤";return;}me=person(pending);pIdx=0;if(isDefault){renderForceChange();return;}if(legacy){const patch={};patch[pending]=h;db.collection("control").doc("trackauth").set(patch,{merge:true});}renderApp();}

 if(canAssign)h+=`<div style="margin-top:10px"><input id="nt-${p.id}" placeholder="要交付的任務內容（指令）…" style="width:100%"><div class="row" style="margin-top:6px;gap:6px;flex-wrap:wrap"><label style="width:auto">指派給</label><select id="nta-${p.id}" style="width:auto">${who.map(k=>`<option value="${esc(k)}">${esc(pn(k))}${k===pmOf(p)?'（負責人）':''}</option>`).join('')}</select><input id="ntd-${p.id}" type="date" style="width:auto"><button class="btn sm" onclick="addTask('${p.id}')">＋ 指派</button></div></div>`;

function staleDays(t){const ts=t&&(t.reportedAt||t.updatedAt);if(!ts)return null;try{const d=ts.toDate?ts.toDate():new Date(ts);return Math.floor((Date.now()-d.getTime())/86400000);}catch(e){return null;}}
function saveDash(id){const st=document.getElementById("stg-"+id),ow=document.getElementById("own-"+id);save(id,{stage:st?st.value:"",handler:ow?ow.value:""});alert("💾 已儲存");}
function dashView(){const cnt={biz:0,prep:0,internal:0,observe:0,stopped:0,undef:0};let stale=0,ckeep=0,xkeep=0;PROJECTS.forEach(function(p){const t=TRACK[p.id]||{};const m=stageMeta(t);const k=m[0]||"undef";cnt[k]=(cnt[k]||0)+1;const sd=staleDays(t);if(m[0]!=="stopped"&&sd!=null&&sd>=14)stale++;if(t.aiClaude==="use")ckeep++;if(t.aiCodex==="use")xkeep++;});const canSet=me.role==="mgr"||me.role==="lead";const ppl=allPeople().filter(function(x){return x.role!=="admin";});
 let h=`<div class="banner">📊 <b>決策儀表板</b>　${canSet?"設定每案發展階段與負責人（選完按 💾 儲存）":"各案發展階段、檢核點與停滯狀況一覽（唯讀）"}。</div><div class="stats"><div class="stat"><div class="n" style="color:#12b886">${cnt.biz}</div><div class="l">🟢 商轉開發中</div></div><div class="stat"><div class="n" style="color:#7c53d6">${cnt.internal}</div><div class="l">🟣 內部使用中</div></div><div class="stat"><div class="n" style="color:#4c8dff">${cnt.prep}</div><div class="l">🔵 準備內部導入</div></div><div class="stat"><div class="n" style="color:#e8a33d">${cnt.observe}</div><div class="l">🟡 觀察評估中</div></div><div class="stat"><div class="n" style="color:#8a93a6">${cnt.stopped}</div><div class="l">⚪ 已叫停</div></div><div class="stat" style="border-color:${stale?"#e0455f66":""}"><div class="n" style="color:var(--warn)">${stale}</div><div class="l">🔴 停滯(14天)</div></div><div class="stat"><div class="n" style="color:var(--navy)">${ckeep}</div><div class="l">🤖 Claude 需保留</div></div><div class="stat"><div class="n" style="color:var(--navy)">${xkeep}</div><div class="l">🤖 Codex 需保留</div></div></div>`;
 Object.keys(GROUPS).forEach(function(gk){const g=GROUPS[gk];h+=`<div class="wk"><div class="wn">${esc(g.n)}（${g.ids.length}）</div>`;h+=g.ids.map(function(id){const p=PROJECTS.find(function(x){return x.id===id;});if(!p)return"";const t=TRACK[id]||{};const m=stageMeta(t);const stopped=m[0]==="stopped";const ps=planStat(t);const sd=staleDays(t);const isStale=!stopped&&sd!=null&&sd>=14;const owner=pmOf(p);const rep=(sd==null)?`<span class="pillst" style="background:#eef1f7;color:var(--mut)">尚未回報</span>`:`<span class="pillst" style="background:${isStale?"#e0455f22":"#eef1f7"};color:${isStale?"var(--warn)":"var(--mut)"}">最後回報 ${sd} 天前${isStale?" ⚠停滯":""}</span>`;let row=`<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:8px 0;border-top:1px solid var(--line);${stopped?"opacity:.45":""}"><b style="min-width:150px;cursor:pointer;color:var(--navy)" onclick="openProj('${id}')">${esc(p.n)}</b>`;if(canSet&&!stopped){row+=`<select id="stg-${id}" style="width:auto">${STAGES.map(function(s){return `<option value="${s[0]}" ${t.stage===s[0]?"selected":""}>${s[1]}</option>`;}).join("")}<option value="" ${!t.stage?"selected":""}>⚪ 未定位</option></select><select id="own-${id}" style="width:auto"><option value="">負責人：未指派</option>${ppl.map(function(x){return `<option value="${esc(x.k)}" ${owner===x.k?"selected":""}>${esc(pn(x.k))}</option>`;}).join("")}</select><button class="btn teal sm" onclick="saveDash('${id}')">💾 儲存</button>`;}else{row+=`<span class="pillst" style="background:${m[2]}22;color:${m[2]}">${m[1]}</span><span class="muted">負責人 ${owner?esc(pn(owner)):"未指派"}</span>`;}row+=`<span class="muted">進度 ${t.progress||0}%</span><span class="muted">檢核點 ${ps.done}/${ps.total}${ps.total?"（"+ps.pct+"%）":""}</span>${rep}<span class="muted" style="font-size:11.5px">🤖 C:<b style="color:${aiColor(t.aiClaude)}">${aiLabel(t.aiClaude)}</b> · Cx:<b style="color:${aiColor(t.aiCodex)}">${aiLabel(t.aiCodex)}</b></span></div>`;return row;}).join("");h+=`</div>`;});return h;}
function weekView(){
 const props=PROJECTS.map(p=>({p,t:TRACK[p.id]||{}})).filter(x=>x.t.proposal);
 const norep=PROJECTS.filter(p=>!reportedToday(TRACK[p.id]));
 const upd=PROJECTS.map(p=>({p,t:TRACK[p.id]||{}})).filter(x=>reportedToday(x.t));
 const blk=upd.filter(x=>x.t.blocker);const stop=PROJECTS.map(p=>({p,t:TRACK[p.id]||{}})).filter(x=>(x.t.decision||"go")!=="go");
 let h=`<div class="banner">📅 今日 ${todayKey()} · 已回報 ${upd.length}/24（沒進度也要回報「無進度」）</div>`;
 if(props.length)h+=`<div class="wk" style="border-color:var(--obs)"><div class="wn" style="color:var(--obs)">🔔 待主管裁決（${props.length}）—— 下層建議叫停/暫停，請裁決</div>${props.map(x=>`<div style="margin-top:7px"><b>${esc(x.p.n)}</b> · ${x.t.proposal.type==='other'?'💡 其他建議':'建議 '+decMeta(x.t.proposal.type)[1]} <span class="muted">by ${esc(x.t.proposal.by)}</span><div style="margin-top:2px">${esc(x.t.proposal.reason)}</div></div>`).join("")}</div>`;
 h+=`<div class="wk" style="border-color:${norep.length?'#e8a33d':'#12b886'}"><div class="wn" style="color:${norep.length?'var(--obs)':'var(--teal)'}">📣 今日還沒回報（${norep.length}）${norep.length?` <button class="btn gh sm" style="margin-left:8px" onclick="remindNoReport()">🔔 提醒全部未回報</button>`:``}</div>${norep.length?'<div style="margin-top:6px;line-height:1.8">'+norep.map(p=>esc(p.n)+' <span class="muted">('+esc(person(p.pm)?person(p.pm).name:p.pm)+')</span>').join('　·　')+'</div>':'<div class="muted" style="margin-top:6px">全部都送出了 🎉</div>'}</div>`;
 h+=`<div class="wk" style="border-color:var(--warn)"><div class="wn" style="color:var(--warn)">🚧 卡關（${blk.length}）</div>${blk.length?blk.map(x=>`<div style="margin-top:7px"><b>${esc(x.p.n)}</b> <span class="muted">· ${esc(pmLabel(x.p))}</span><div style="color:var(--warn);margin-top:2px">${esc(x.t.blocker)}</div><button class="btn gh sm" style="margin-top:5px" onclick="remindBlocker('${x.p.id}')">🔔 追蹤此卡關</button></div>`).join(''):'<div class="muted" style="margin-top:6px">無</div>'}</div>`;
 if(stop.length)h+=`<div class="wk" style="border-color:var(--obs)"><div class="wn" style="color:var(--obs)">⏸ 暫停/叫停（${stop.length}）</div>${stop.map(x=>`<div style="margin-top:6px"><b>${esc(x.p.n)}</b> · ${decMeta(x.t.decision)[1]} <span class="muted">${x.t.decisionReason?'· '+esc(x.t.decisionReason):''}</span></div>`).join('')}</div>`;
 h+=`<div class="muted" style="margin:12px 4px 8px;font-weight:800">今日回報內容（${upd.length}）</div>`;
 h+=upd.length?upd.map(x=>`<div class="wk"><div class="wn">${esc(x.p.n)} <span class="muted" style="font-size:12px">· ${esc(pmLabel(x.p))} · 進度 ${x.t.progress||0}%</span></div>${x.t.week?'<div style="margin-top:5px">✍️ '+esc(x.t.week)+'</div>':''}${x.t.nextStep?'<div style="margin-top:3px;color:var(--mut)">➡️ '+esc(x.t.nextStep)+'</div>':''}</div>`).join(''):'<div class="muted">本週尚無送出</div>';
 return h;
}
function permView(){
 const ppl=allPeople().filter(x=>x.role==='pm'||x.role==='member'||x.role==='mgr'||x.role==='collab');
 return `<div class="banner">🔑 <b>角色與權限設定</b>　可調整每案的<b>負責人</b>、<b>可輸入</b>、<b>可檢視</b>；也能<b>指定名單外的人</b>（他用「名字＋8888」登入，首次登入需改密碼）。主管與 PUNK 一律看全部。</div>`+
 `<div class="wk"><div class="wn">📧 指派通知信範本（有人被指派/加入專案時自動寄）</div><div class="muted" style="font-size:12px;margin:5px 0 8px">可用變數：{name}=姓名、{project}=專案、{role}=角色、{url}=系統網址。留空則用內建預設。</div><textarea id="assignTplBox" style="width:100%;min-height:150px;font-family:inherit;line-height:1.6">${esc(ASSIGN_TPL||DEFAULT_ASSIGN_TPL)}</textarea><div class="row" style="gap:6px;margin-top:8px"><button class="btn teal sm" onclick="saveTplBox()">💾 儲存範本</button><button class="btn gh sm" onclick="var e=document.getElementById(&#39;assignTplBox&#39;);e.value=DEFAULT_ASSIGN_TPL">↩ 還原預設</button><button class="btn gh sm" onclick="alert(assignMail(&#39;王小明&#39;,&#39;好事成雙&#39;,&#39;負責人&#39;))">👁 預覽</button></div></div><div class="wk"><div class="wn">🔑 帳號 · Email · 密碼 <button class="btn gh sm" style="margin-left:8px" onclick="resetAllPw()">🔄 一鍵重設全部密碼</button> <button class="btn gh sm" onclick="testMail()">🔔 測試寄信</button> <button class="btn gh sm" onclick="resetAllPerm()">🔄 重設所有角色權限</button></div><div class="muted" style="font-size:12px;margin:5px 0 9px">填 email 才能收通知（Email 通知目前：${NOTIFY_URL?'<b style=color:var(--teal)>已啟用</b>':'<b style=color:var(--warn)>未設定，見說明</b>'}）。重設＝把密碼設回 8888，對方下次登入需改新密碼。綠點＝已自訂密碼。</div><div style="display:flex;flex-wrap:wrap;gap:8px">${allPeople().map(x=>`<div style="display:flex;align-items:center;gap:8px;background:var(--soft);border:1px solid var(--line);border-radius:9px;padding:6px 9px;font-size:12.5px;margin-bottom:6px;flex-wrap:wrap"><span style="width:8px;height:8px;border-radius:50%;background:${(PINS&&PINS[x.k])?'var(--teal)':'#c3c9d6'};flex:none"></span><b style="min-width:110px">${esc((x.name||'').replace('（隊長）',''))}</b><input placeholder="email（收通知用）" value="${esc((MAIL&&MAIL[x.k])||'')}" onchange="setMail('${x.k}',this.value)" style="flex:1;min-width:160px;padding:6px"><button class="btn gh sm" onclick="resetPw('${jesc(x.k)}')">重設密碼</button></div>`).join('')}</div></div>`+
 PROJECTS.map(p=>{const ed=editorsOf(p),vw=viewersOf(p),curpm=pmOf(p);
  const chips=(field,arr)=>(arr.length?arr.map(k=>`<span class="chip s" style="padding:3px 9px">${esc(pn(k))} <span onclick="togPerm('${p.id}','${field}','${jesc(k)}')" style="cursor:pointer;color:var(--warn);font-weight:900;margin-left:3px">×</span></span>`).join(''):'<span class="muted" style="font-size:12px">（目前無）</span>')+` <select onchange="quickAdd('${p.id}','${field}',this.value)" style="width:auto;padding:4px 7px;font-size:12px;margin-left:4px"><option value="">＋ 從名單加入</option>${allPeople().filter(x=>!arr.includes(x.k)).map(x=>`<option value="${esc(x.k)}">${esc((x.name||'').replace('（隊長）',''))}</option>`).join('')}</select> <span class="chip s" style="border:1px dashed var(--teal)" onclick="addAssigned('${p.id}','${field}')">＋ 指定新人</span>`;
  return `<div class="wk"><div class="wn">${esc(p.n)} <span class="muted" style="font-size:12px">· ${BUCKETS[p.bk].n}</span></div>
   <div class="row"><label>負責人</label>${p.team?'<span style="font-weight:800">RAE · IAN · GIBBY（三人共管）</span>':`<select style="width:auto" onchange="togPM('${p.id}',this.value)">${allPeople().filter(x=>x.role==='pm').map(x=>`<option value="${esc(x.k)}" ${x.k===curpm?'selected':''}>${esc(x.name)}</option>`).join('')}</select>`}</div>
   <div style="margin-top:7px"><span class="muted" style="font-size:11px">可輸入（editors）</span><div style="margin-top:4px">${chips('editors',ed)}</div></div>
   <div style="margin-top:7px"><span class="muted" style="font-size:11px">可檢視（viewers · 額外開放看的人）</span><div style="margin-top:4px">${chips('viewers',vw)}</div></div>
  </div>`;}).join("");
}
function saveTplBox(){const el=document.getElementById("assignTplBox");const v=el?el.value:"";db.collection("control").doc("tracksettings").set({assignTpl:v},{merge:true}).then(()=>alert("✅ 指派通知信範本已儲存")).catch(e=>alert("失敗："+e.message));}
function togPM(pid,key){const cur=Object.assign({},PERM[pid]||{});cur.pm=key;const patch={};patch[pid]=cur;db.collection("control").doc("trackperm").set(patch,{merge:true}).catch(e=>alert("失敗："+e.message));}
function quickAdd(pid,field,key){if(!key)return;togPerm(pid,field,key);}
function addAssigned(pid,field){const nm=prompt("輸入要指定的人的名字（英文不分大小寫；他可用「名字＋8888」登入，首次需改密碼）：");if(!nm)return;const k=nm.trim();if(!k)return;let em=((MAIL&&MAIL[k])||"").trim();if(!em){em=(prompt("填他的 Email（會寄通知，必填）：")||"").trim();if(!em){alert("需要 Email 才能指派。");return;}}togPerm(pid,field,k);setMail(k,em);const pp=PROJECTS.find(x=>x.id===pid);notify(k,"【追蹤系統】你被加入專案："+(pp?pp.n:""),assignMail(pn(k),pp?pp.n:"",field==="viewers"?"檢視者":"協作者"),em);}
function resetPw(key){if(!confirm("將「"+key+"」的密碼重設為 8888？對方下次登入需重新設定新密碼。"))return;const patch={};patch[key]=firebase.firestore.FieldValue.delete();db.collection("control").doc("trackauth").set(patch,{merge:true}).then(()=>alert("✅ 已重設為 8888")).catch(e=>alert("失敗："+e.message));}
function resetAllPerm(){if(!confirm("重設所有專案的角色/權限回預設（負責人＋隊長）？\n（清掉測試時改過的指派）"))return;db.collection("control").doc("trackperm").set({}).then(()=>alert("✅ 已重設，全部回預設分工")).catch(e=>alert("失敗："+e.message));}
function testMail(){if(!NOTIFY_URL){alert("尚未設定 NOTIFY_URL（HTML 最上面），無法寄信。");return;}const to=prompt("輸入要收測試信的 Email：");if(!to)return;notify("__test__","【追蹤系統】測試信 ✅","這是一封測試通知。收到代表 Email 通知正常運作。",to.trim());alert("已送出測試信到："+to.trim()+"\n請查收（含垃圾信匣）。\n若沒收到：多半是 Apps Script 部署的『誰可以存取』不是 Anyone、或網址不是 /exec。");}
function resetAllPw(){if(!confirm("確定把「所有帳號」的密碼都重設回預設？\n（清掉所有已改的密碼，大家下次登入需重新設定新密碼）"))return;db.collection("control").doc("trackauth").set({}).then(()=>alert("✅ 已全部重設為預設 8888")).catch(e=>alert("失敗："+e.message));}
function setMail(key,val){val=(val||"").trim();MAIL[key]=val;const patch={};patch[key]=val;db.collection("control").doc("trackmail").set(patch,{merge:true}).catch(e=>alert("失敗："+e.message));}
function togPerm(pid,field,key){
 const cur=Object.assign({},PERM[pid]||{});const p=PROJECTS.find(x=>x.id===pid);
 let arr=(cur[field]||(field==='editors'?editorsOf(p):viewersOf(p))).slice();
 if(arr.includes(key))arr=arr.filter(x=>x!==key);else arr.push(key);
 cur[field]=arr;const patch={};patch[pid]=cur;
 db.collection("control").doc("trackperm").set(patch,{merge:true}).catch(e=>alert("失敗："+e.message));
}
function exportCSV(){
 const head=["專案","去向","負責人","追蹤對象","隊長","今日回報","狀態","決策","叫停原因","進度%","今日內容","下一步","卡關","預期完成","Claude帳號","Codex帳號","更新者","更新時間"];
 const rows=PROJECTS.map(p=>{const t=TRACK[p.id]||{};return [p.n,BUCKETS[p.bk].n,pmLabel(p),pn(handlerOf(p)),p.lead,reportedToday(t)?"是":"否",stMeta(t.status||"idle")[1],decMeta(t.decision||"go")[1],t.decisionReason||"",t.progress||0,t.today||"",t.nextStep||p.next,t.blocker||"",t.due||"",aiLabel(t.aiClaude),aiLabel(t.aiCodex),t.updatedBy||"",t.updatedAt?fmt(t.updatedAt):""];});
 const csv=[head,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
 const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["﻿"+csv],{type:"text/csv"}));a.download="專案追蹤_"+new Date().toISOString().slice(0,10)+".csv";a.click();
}
var IDLE_MIN=30,idleTimer=null;
function resetIdle(){if(idleTimer){clearTimeout(idleTimer);idleTimer=null;}if(!me)return;idleTimer=setTimeout(function(){if(!me)return;me=null;pending=null;if(idleTimer){clearTimeout(idleTimer);idleTimer=null;}try{alert("閒置超過 "+IDLE_MIN+" 分鐘，已自動登出，請重新登入。");}catch(e){}renderLogin();},IDLE_MIN*60*1000);}
["mousemove","mousedown","keydown","touchstart","scroll","click"].forEach(function(ev){try{document.addEventListener(ev,resetIdle,{passive:true});}catch(e){document.addEventListener(ev,resetIdle);}});
init();
</script></body></html>
