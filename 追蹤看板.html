function addPlan(pid){const w=document.getElementById("pw-"+pid),g=document.getElementById("pg-"+pid);const wk=w?w.value:"";const goal=g?g.value.trim():"";if(!goal||!wk)return;const t=TRACK[pid]||{};const plan=(t.plan||[]).slice();plan.push({id:uid(),week:wk,goal:goal,done:false});save(pid,{plan:plan});}

  h+=`</div>`;
 }else if(ed&&!isLead){
  h+=`<div class="row" style="margin-top:8px;gap:8px;flex-wrap:wrap"><span class="muted" style="flex:1;min-width:140px">覺得這案不該繼續推？可建議主管裁決：</span><button class="btn gh sm" onclick="propose('${p.id}','hold')">建議暫停</button><button class="btn gh sm" onclick="propose('${p.id}','stop')">建議叫停</button></div>`;
 }
 if(dec!=="go")h+=`<div class="sec" style="border:0;padding-top:8px"><div class="sl" style="color:var(--warn)">${dm[1]} 原因（主管裁定）</div>${isLead?`<textarea onchange="save('${p.id}',{decisionReason:this.value})" placeholder="裁定原因…">${esc(t.decisionReason||'')}</textarea>`:`<div class="ro">${esc(t.decisionReason||'—')}</div>`}</div>`;

 PROJECTS.map(p=>{const ed=editorsOf(p),vw=viewersOf(p),curpm=pmOf(p);
  const chips=(field,arr)=>(arr.length?arr.map(k=>`<span class="chip s" style="padding:3px 9px">${esc(pn(k))} <span onclick="togPerm('${p.id}','${field}','${k}')" style="cursor:pointer;color:var(--warn);font-weight:900;margin-left:3px">×</span></span>`).join(''):'<span class="muted" style="font-size:12px">（目前無）</span>')+` <select onchange="quickAdd('${p.id}','${field}',this.value)" style="width:auto;padding:4px 7px;font-size:12px;margin-left:4px"><option value="">＋ 從名單加入</option>${allPeople().filter(x=>!arr.includes(x.k)).map(x=>`<option value="${x.k}">${esc((x.name||'').replace('（隊長）',''))}</option>`).join('')}</select> <span class="chip s" style="border:1px dashed var(--teal)" onclick="addAssigned('${p.id}','${field}')">＋ 指定新人</span>`;
  return `<div class="wk"><div class="wn">${esc(p.n)} <span class="muted" style="font-size:12px">· ${BUCKETS[p.bk].n}</span></div>
   <div class="row"><label>負責人</label>${p.team?'<span style="font-weight:800">RAE · IAN · GIBBY（三人共管）</span>':`<select style="width:auto" onchange="togPM('${p.id}',this.value)">${allPeople().filter(x=>x.role==='pm').map(x=>`<option value="${x.k}" ${x.k===curpm?'selected':''}>${esc(x.name)}</option>`).join('')}</select>`}</div>
   <div style="margin-top:7px"><span class="muted" style="font-size:11px">可輸入（editors）</span><div style="margin-top:4px">${chips('editors',ed)}</div></div>
   <div style="margin-top:7px"><span class="muted" style="font-size:11px">可檢視（viewers · 額外開放看的人）</span><div style="margin-top:4px">${chips('viewers',vw)}</div></div>
  </div>`;}).join("");
}
function togPM(pid,key){const cur=Object.assign({},PERM[pid]||{});cur.pm=key;const patch={};patch[pid]=cur;db.collection("control").doc("trackperm").set(patch,{merge:true}).catch(e=>alert("失敗："+e.message));}
function quickAdd(pid,field,key){if(!key)return;togPerm(pid,field,key);}
function addAssigned(pid,field){const nm=prompt("輸入要指定的人的名字（英文不分大小寫；他可用「名字＋8888」登入，首次需改密碼）：");if(!nm)return;const k=nm.trim();const em=prompt("順便填他的 Email（收通知用，可留空）：")||"";togPerm(pid,field,k);if(em.trim())setMail(k,em.trim());}
function resetPw(key){if(!confirm("將「"+key+"」的密碼重設為 8888？對方下次登入需重新設定新密碼。"))return;const patch={};patch[key]=firebase.firestore.FieldValue.delete();db.collection("control").doc("trackauth").set(patch,{merge:true}).then(()=>alert("✅ 已重設為 8888")).catch(e=>alert("失敗："+e.message));}
function testMail(){if(!NOTIFY_URL){alert("尚未設定 NOTIFY_URL（HTML 最上面），無法寄信。");return;}const to=prompt("輸入要收測試信的 Email：");if(!to)return;notify("__test__","【追蹤系統】測試信 ✅","這是一封測試通知。收到代表 Email 通知正常運作。",to.trim());alert("已送出測試信到："+to.trim()+"\n請查收（含垃圾信匣）。\n若沒收到：多半是 Apps Script 部署的『誰可以存取』不是 Anyone、或網址不是 /exec。");}
function resetAllPw(){if(!confirm("確定把「所有帳號」的密碼都重設回預設？\n（清掉所有已改的密碼，大家下次登入需重新設定新密碼）"))return;db.collection("control").doc("trackauth").set({}).then(()=>alert("✅ 已全部重設為預設 8888")).catch(e=>alert("失敗："+e.message));}
function setMail(key,val){val=(val||"").trim();MAIL[key]=val;const patch={};patch[key]=val;db.collection("control").doc("trackmail").set(patch,{merge:true}).catch(e=>alert("失敗："+e.message));}
function togPerm(pid,field,key){
 const cur=Object.assign({},PERM[pid]||{});const p=PROJECTS.find(x=>x.id===pid);
 let arr=(cur[field]||(field==='editors'?editorsOf(p):viewersOf(p))).slice();
 if(arr.includes(key))arr=arr.filter(x=>x!==key);else arr.push(key);
 cur[field]=arr;const patch={};patch[pid]=cur;
 db.collection("control").doc("trackperm").set(patch,{merge:true}).catch(e=>alert("失敗："+e.message));
}
function exportCSV(){
 const head=["專案","去向","負責人","追蹤對象","隊長","本週送出","狀態","決策","叫停原因","進度%","本週做了什麼","下一步","卡關","預期完成","更新者","更新時間"];
 const rows=PROJECTS.map(p=>{const t=TRACK[p.id]||{};return [p.n,BUCKETS[p.bk].n,pmLabel(p),pn(handlerOf(p)),p.lead,submittedThisWeek(t)?"是":"否",stMeta(t.status||"idle")[1],decMeta(t.decision||"go")[1],t.decisionReason||"",t.progress||0,t.week||"",t.nextStep||p.next,t.blocker||"",t.due||"",t.updatedBy||"",t.updatedAt?fmt(t.updatedAt):""];});
 const csv=[head,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
 const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["﻿"+csv],{type:"text/csv"}));a.download="專案追蹤_"+new Date().toISOString().slice(0,10)+".csv";a.click();
}
init();
</script></body></html>
