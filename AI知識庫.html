<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企業 AI 知識庫｜地端・可接任何 LLM</title>
<style>
  :root{--bg:#0f1117;--panel:#171a22;--card:#1e222c;--line:#ffffff14;--txt:#eef0f6;--mut:#9aa0b0;--dim:#6b7180;--acc:#4f8cff;--acc2:#22c39a;--pink:#ff5d8f;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;}
  .app{display:flex;height:100vh;}
  .side{width:300px;flex:none;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;}
  .brand{padding:16px 16px 10px;font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px;}
  .brand small{font-weight:400;color:var(--dim);font-size:11px;}
  .sbtn{margin:0 12px 8px;display:flex;gap:8px;}
  button{font-family:inherit;cursor:pointer;}
  .btn{flex:1;background:var(--acc);color:#fff;border:none;border-radius:10px;padding:10px;font-weight:700;font-size:13px;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);}
  .btn.mini{padding:7px 10px;font-size:12px;flex:none;}
  .search{margin:0 12px 8px;}
  .search input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:9px 11px;font-size:13px;}
  .doclist{flex:1;overflow:auto;padding:4px 8px 12px;}
  .doc{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 11px;margin:6px 4px;cursor:pointer;}
  .doc:hover{border-color:var(--acc);}
  .doc.sel{border-color:var(--acc2);}
  .doc .t{font-weight:700;font-size:13px;line-height:1.35;}
  .doc .m{font-size:11px;color:var(--dim);margin-top:3px;display:flex;justify-content:space-between;}
  .doc .del{color:var(--dim);font-size:12px;}
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .topbar{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--line);align-items:center;}
  .tab{background:transparent;border:none;color:var(--mut);font-weight:700;font-size:14px;padding:8px 12px;border-radius:8px;}
  .tab.on{color:var(--txt);background:var(--card);}
  .status{margin-left:auto;font-size:12px;color:var(--dim);}
  .view{flex:1;overflow:auto;padding:18px;}
  .hidden{display:none;}
  /* chat */
  .chat{max-width:820px;margin:0 auto;}
  .msg{margin-bottom:18px;}
  .msg .who{font-size:12px;color:var(--dim);margin-bottom:5px;}
  .bubble{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;line-height:1.75;font-size:15px;white-space:pre-wrap;}
  .msg.me .bubble{background:#1a2740;border-color:#2a4270;}
  .cites{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
  .cite{font-size:11px;background:#22314f;color:#bcd0ff;border:1px solid #34467a;border-radius:999px;padding:3px 10px;cursor:pointer;}
  .askbar{max-width:820px;margin:0 auto;display:flex;gap:8px;padding-top:6px;position:sticky;bottom:0;background:var(--bg);}
  .askbar textarea{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:12px 14px;font-size:15px;font-family:inherit;resize:none;height:52px;}
  .empty{color:var(--dim);text-align:center;padding:60px 20px;line-height:1.9;}
  /* doc view */
  .docview{max-width:820px;margin:0 auto;}
  .docview h2{font-size:22px;}
  .docview .src{font-size:12px;color:var(--dim);margin:6px 0 16px;}
  .docview pre{white-space:pre-wrap;font-family:inherit;font-size:14px;line-height:1.8;color:var(--mut);}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50;}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;width:100%;max-width:520px;max-height:88vh;overflow:auto;}
  .box h3{margin:0 0 4px;font-size:17px;}
  .box p.sub{margin:0 0 14px;color:var(--dim);font-size:12px;}
  label{display:block;font-size:12px;color:var(--mut);margin:12px 0 5px;}
  input[type=text],input[type=password],textarea,select{width:100%;background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:11px;font-size:14px;font-family:inherit;}
  textarea.big{height:150px;resize:vertical;}
  .row{display:flex;gap:8px;}
  .row>*{flex:1;}
  .mbtns{display:flex;gap:8px;margin-top:16px;}
  .seg{display:flex;gap:6px;background:var(--card);border-radius:10px;padding:4px;margin-bottom:6px;}
  .seg button{flex:1;background:transparent;border:none;color:var(--mut);padding:8px;border-radius:8px;font-weight:700;font-size:13px;}
  .seg button.on{background:var(--acc);color:#fff;}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--dim);font-size:13px;cursor:pointer;}
  .hint{font-size:12px;color:var(--dim);margin-top:8px;line-height:1.6;}
  .tag{display:inline-block;font-size:11px;background:#22314f;color:#bcd0ff;border-radius:999px;padding:2px 9px;margin:2px 3px 0 0;}
  /* graph */
  #graph{width:100%;height:70vh;}
  .k{color:var(--acc2);}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">🧠 企業 AI 知識庫 <small>地端・私有</small></div>
    <div class="sbtn">
      <button class="btn" onclick="openAdd()">＋ 新增知識</button>
      <button class="btn ghost mini" onclick="openSettings()">⚙</button>
    </div>
    <div class="search"><input id="q" placeholder="搜尋知識庫…" oninput="renderDocs()"></div>
    <div class="doclist" id="doclist"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="tab on" id="tab-chat" onclick="tab('chat')">💬 問答</button>
      <button class="tab" id="tab-doc" onclick="tab('doc')">📄 文件</button>
      <button class="tab" id="tab-graph" onclick="tab('graph'); drawGraph()">🕸 知識圖譜</button>
      <span class="status" id="llmStatus"></span>
    </div>
    <div class="view">
      <div id="v-chat">
        <div class="chat" id="chatlog"><div class="empty">上傳或貼上你的公司文件，然後在下面提問。<br>AI 會<strong>只根據你的知識庫</strong>回答，並附上<strong>來源出處</strong>。</div></div>
        <div class="askbar">
          <textarea id="ask" placeholder="問一個問題…（Enter 送出，Shift+Enter 換行）" onkeydown="askKey(event)"></textarea>
          <button class="btn" style="flex:none;width:88px" onclick="doAsk()">送出</button>
        </div>
      </div>
      <div id="v-doc" class="hidden"><div class="docview" id="docview"><div class="empty">左側點一份文件來閱讀。</div></div></div>
      <div id="v-graph" class="hidden"><svg id="graph"></svg></div>
    </div>
  </main>
</div>

<!-- Add modal -->
<div id="addModal" class="modal hidden">
  <div class="box">
    <h3>新增知識</h3>
    <p class="sub">資料只存在你這台電腦（本機 IndexedDB），不會上傳雲端。</p>
    <div class="seg">
      <button id="s-paste" class="on" onclick="addMode('paste')">貼上文字</button>
      <button id="s-file" onclick="addMode('file')">上傳檔案</button>
      <button id="s-url" onclick="addMode('url')">爬網址</button>
    </div>
    <div id="m-paste">
      <label>標題</label><input type="text" id="p-title" placeholder="例如：請假辦法 2026">
      <label>內容</label><textarea id="p-text" class="big" placeholder="貼上文件內容…"></textarea>
    </div>
    <div id="m-file" class="hidden">
      <div class="drop" id="drop" onclick="filepick.click()">📎 點此或拖曳檔案<br><small>支援 .txt / .md / .pdf / .docx</small></div>
      <input type="file" id="filepick" class="hidden" multiple accept=".txt,.md,.pdf,.docx" onchange="onFiles(this.files)">
      <div class="hint" id="fileinfo"></div>
    </div>
    <div id="m-url" class="hidden">
      <label>網址</label><input type="text" id="u-url" placeholder="https://…">
      <div class="hint">瀏覽器直接抓網址會受 CORS 限制，部分網站抓不到；抓不到時請改「貼上文字」。</div>
    </div>
    <div class="mbtns">
      <button class="btn" onclick="saveAdd()">加入知識庫</button>
      <button class="btn ghost" onclick="closeModal('addModal')">取消</button>
    </div>
    <div class="hint" id="addErr" style="color:var(--pink)"></div>
  </div>
</div>

<!-- Settings modal -->
<div id="setModal" class="modal hidden">
  <div class="box">
    <h3>⚙ LLM 設定</h3>
    <p class="sub">接任何 LLM：本地 Ollama／LM Studio／vLLM（完全離線）、OpenAI、或任何 OpenAI 相容端點。</p>
    <label>供應商格式</label>
    <select id="cfg-prov" onchange="provHint()">
      <option value="openai">OpenAI 相容（含 Ollama / LM Studio / vLLM / OpenAI）</option>
      <option value="anthropic">Anthropic（Claude）</option>
    </select>
    <div class="hint" id="provhint"></div>
    <label>Base URL</label><input type="text" id="cfg-url" placeholder="http://localhost:11434/v1">
    <label>API Key（本地模型可留空）</label><input type="password" id="cfg-key" placeholder="sk-...">
    <label>模型名稱</label><input type="text" id="cfg-model" placeholder="llama3.1 / gpt-4o-mini / claude-3-5-sonnet-...">
    <div class="mbtns">
      <button class="btn" onclick="saveSettings()">儲存</button>
      <button class="btn ghost" onclick="testLLM()">測試連線</button>
      <button class="btn ghost" onclick="closeModal('setModal')">關閉</button>
    </div>
    <div class="hint" id="setMsg"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script>
if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ---------- storage (IndexedDB) ---------- */
let DB=null;
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('kb',1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('docs'))d.createObjectStore('docs',{keyPath:'id'});};r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e);});}
function put(doc){return new Promise((res,rej)=>{const t=DB.transaction('docs','readwrite');t.objectStore('docs').put(doc);t.oncomplete=res;t.onerror=rej;});}
function delDoc(id){return new Promise((res,rej)=>{const t=DB.transaction('docs','readwrite');t.objectStore('docs').delete(id);t.oncomplete=res;t.onerror=rej;});}
function all(){return new Promise((res,rej)=>{const t=DB.transaction('docs','readonly');const rq=t.objectStore('docs').getAll();rq.onsuccess=()=>res(rq.result||[]);rq.onerror=rej;});}
let DOCS=[];

/* ---------- settings ---------- */
function cfg(){try{return JSON.parse(localStorage.getItem('kbcfg')||'{}');}catch(e){return {};}}
function saveCfgObj(o){localStorage.setItem('kbcfg',JSON.stringify(o));}
function openSettings(){const c=cfg();document.getElementById('cfg-prov').value=c.prov||'openai';document.getElementById('cfg-url').value=c.url||'';document.getElementById('cfg-key').value=c.key||'';document.getElementById('cfg-model').value=c.model||'';provHint();show('setModal');}
function provHint(){const p=document.getElementById('cfg-prov').value;document.getElementById('provhint').innerHTML=p==='openai'?'例：Ollama <span class="k">http://localhost:11434/v1</span>（模型 llama3.1）；OpenAI <span class="k">https://api.openai.com/v1</span>（模型 gpt-4o-mini）':'例：<span class="k">https://api.anthropic.com</span>（模型 claude-3-5-sonnet-latest）。瀏覽器直連需該端點允許 CORS。';}
function saveSettings(){const o={prov:document.getElementById('cfg-prov').value,url:document.getElementById('cfg-url').value.trim().replace(/\/$/,''),key:document.getElementById('cfg-key').value.trim(),model:document.getElementById('cfg-model').value.trim()};saveCfgObj(o);document.getElementById('setMsg').textContent='✓ 已儲存';llmBadge();}
function llmBadge(){const c=cfg();document.getElementById('llmStatus').textContent=c.model?('🟢 '+c.model):'⚪ 未設定 LLM（僅檢索）';}

/* ---------- LLM call ---------- */
async function callLLM(system,user){
  const c=cfg();
  if(!c.model||!c.url) throw new Error('尚未設定 LLM（右上角 ⚙）');
  if(c.prov==='anthropic'){
    const r=await fetch(c.url+'/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':c.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:c.model,max_tokens:1024,system:system,messages:[{role:'user',content:user}]})});
    if(!r.ok) throw new Error('LLM '+r.status+'：'+(await r.text()).slice(0,200));
    const j=await r.json();return j.content.map(x=>x.text).join('');
  }else{
    const r=await fetch(c.url+'/chat/completions',{method:'POST',headers:{'content-type':'application/json',...(c.key?{'authorization':'Bearer '+c.key}:{})},body:JSON.stringify({model:c.model,messages:[{role:'system',content:system},{role:'user',content:user}],temperature:0.2})});
    if(!r.ok) throw new Error('LLM '+r.status+'：'+(await r.text()).slice(0,200));
    const j=await r.json();return j.choices[0].message.content;
  }
}
async function testLLM(){const m=document.getElementById('setMsg');m.textContent='測試中…';saveSettings();try{const a=await callLLM('你是測試助手，只回四個字。','請回覆「連線成功」');m.textContent='✓ 回應：'+a.slice(0,40);}catch(e){m.textContent='✗ '+e.message;}}

/* ---------- chunk + retrieve (TF-IDF) ---------- */
function chunk(text){const parts=[];const clean=text.replace(/\s+\n/g,'\n');let buf='';clean.split(/\n{2,}|\n/).forEach(p=>{if((buf+p).length>600){if(buf)parts.push(buf.trim());buf=p;}else buf+='\n'+p;});if(buf.trim())parts.push(buf.trim());return parts.filter(x=>x.length>10);}
function toks(s){return (s.toLowerCase().match(/[a-z0-9]+|[一-鿿]/g)||[]);}
function retrieve(query,k){
  const qt=toks(query);const qset={};qt.forEach(t=>qset[t]=(qset[t]||0)+1);
  const df={};const chunks=[];
  DOCS.forEach(d=>(d.chunks||[]).forEach((c,i)=>{const tk=toks(c);const seen={};tk.forEach(t=>{if(!seen[t]){seen[t]=1;df[t]=(df[t]||0)+1;}});chunks.push({doc:d,ci:i,text:c,tk});}));
  const N=chunks.length||1;
  const scored=chunks.map(ch=>{const tf={};ch.tk.forEach(t=>tf[t]=(tf[t]||0)+1);let s=0;for(const t in qset){if(tf[t]){const idf=Math.log(1+N/(1+(df[t]||0)));s+=(1+Math.log(tf[t]))*idf*qset[t];}}return {...ch,s};});
  return scored.sort((a,b)=>b.s-a.s).filter(x=>x.s>0).slice(0,k||5);
}

/* ---------- ask ---------- */
let CHAT=[];
function askKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doAsk();}}
async function doAsk(){
  const box=document.getElementById('ask');const q=box.value.trim();if(!q)return;box.value='';
  addMsg('me',q,[]);
  if(!DOCS.length){addMsg('ai','知識庫還是空的，請先「＋ 新增知識」。',[]);return;}
  const hits=retrieve(q,6);
  if(!hits.length){addMsg('ai','在知識庫裡找不到相關內容。',[]);return;}
  const c=cfg();
  const context=hits.map((h,i)=>`[${i+1}] 《${h.doc.title}》\n${h.text}`).join('\n\n');
  if(!c.model||!c.url){
    addMsg('ai','（未接 LLM，以下為知識庫中最相關的段落，請自行參考）\n\n'+hits.slice(0,3).map((h,i)=>`【${i+1}】${h.text}`).join('\n\n'),hits);
    return;
  }
  const id=addMsg('ai','思考中…',[]);
  try{
    const sys='你是企業內部知識庫助理。只能根據下方「參考資料」回答問題，不得杜撰。回答時在句末用 [編號] 標註依據的來源。若參考資料不足以回答，就說「知識庫中查無足夠資訊」。用繁體中文回答。';
    const user='參考資料：\n'+context+'\n\n問題：'+q;
    const ans=await callLLM(sys,user);
    updateMsg(id,ans,hits);
  }catch(e){updateMsg(id,'⚠ '+e.message,hits);}
}
function addMsg(who,text,hits){const log=document.getElementById('chatlog');if(log.querySelector('.empty'))log.innerHTML='';const id='m'+Date.now()+Math.random().toString(36).slice(2,6);const div=document.createElement('div');div.className='msg '+(who==='me'?'me':'');div.id=id;div.innerHTML='<div class="who">'+(who==='me'?'你':'🤖 知識庫助理')+'</div><div class="bubble"></div><div class="cites"></div>';log.appendChild(div);div.querySelector('.bubble').textContent=text;renderCites(div,hits);div.scrollIntoView({behavior:'smooth',block:'end'});return id;}
function updateMsg(id,text,hits){const div=document.getElementById(id);if(!div)return;div.querySelector('.bubble').textContent=text;renderCites(div,hits);div.scrollIntoView({behavior:'smooth',block:'end'});}
function renderCites(div,hits){const c=div.querySelector('.cites');if(!hits||!hits.length){c.innerHTML='';return;}const seen={};let html='';hits.forEach((h,i)=>{if(seen[h.doc.id])return;seen[h.doc.id]=1;html+='<span class="cite" onclick="openDoc(\''+h.doc.id+'\')">['+(i+1)+'] '+esc(h.doc.title)+'</span>';});c.innerHTML=html;}

/* ---------- add knowledge ---------- */
let addM='paste',pending=[];
function openAdd(){addM='paste';addMode('paste');document.getElementById('p-title').value='';document.getElementById('p-text').value='';document.getElementById('u-url').value='';document.getElementById('fileinfo').textContent='';document.getElementById('addErr').textContent='';pending=[];show('addModal');}
function addMode(m){addM=m;['paste','file','url'].forEach(x=>{document.getElementById('m-'+x).classList.toggle('hidden',x!==m);document.getElementById('s-'+x).classList.toggle('on',x===m);});}
async function onFiles(files){pending=[];const info=document.getElementById('fileinfo');info.textContent='讀取中…';const out=[];for(const f of files){try{out.push({title:f.name.replace(/\.[^.]+$/,''),text:await readFile(f)});}catch(e){out.push({title:f.name,text:'',err:e.message});}}pending=out;info.innerHTML=out.map(o=>'• '+esc(o.title)+(o.err?' <span style="color:var(--pink)">('+o.err+')</span>':' ('+o.text.length+' 字)')).join('<br>');}
function readFile(f){return new Promise(async(res,rej)=>{const ext=(f.name.split('.').pop()||'').toLowerCase();try{
  if(ext==='pdf'){const buf=await f.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;let t='';for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();t+=c.items.map(x=>x.str).join(' ')+'\n';}res(t);}
  else if(ext==='docx'){const buf=await f.arrayBuffer();const r=await mammoth.extractRawText({arrayBuffer:buf});res(r.value);}
  else{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(f);}
}catch(e){rej(e);}});}
async function saveAdd(){
  const err=document.getElementById('addErr');err.textContent='';let items=[];
  if(addM==='paste'){const t=document.getElementById('p-title').value.trim()||'未命名';const x=document.getElementById('p-text').value.trim();if(!x){err.textContent='請貼上內容';return;}items=[{title:t,text:x}];}
  else if(addM==='file'){if(!pending.length){err.textContent='請先選檔案';return;}items=pending.filter(p=>p.text&&p.text.length>5);}
  else if(addM==='url'){const u=document.getElementById('u-url').value.trim();if(!u){err.textContent='請輸入網址';return;}err.textContent='抓取中…';try{const r=await fetch(u);const html=await r.text();const tmp=document.createElement('div');tmp.innerHTML=html.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<style[\s\S]*?<\/style>/gi,'');const text=(tmp.textContent||'').replace(/\n{3,}/g,'\n\n').trim();const title=(html.match(/<title>([^<]*)<\/title>/i)||[])[1]||u;items=[{title:title,text:text,source:u}];}catch(e){err.textContent='抓取失敗（多半是 CORS）：'+e.message+'。請改用貼上文字。';return;}}
  for(const it of items){const doc={id:'d'+Date.now()+Math.random().toString(36).slice(2,6),title:it.title,source:it.source||addM,text:it.text,chunks:chunk(it.text),keys:topKeys(it.text),ts:Date.now()};await put(doc);}
  DOCS=await all();renderDocs();closeModal('addModal');
}

/* ---------- keywords + graph ---------- */
const STOP={'的':1,'是':1,'在':1,'和':1,'了':1,'我':1,'你':1,'他':1,'們':1,'與':1,'及':1,'the':1,'a':1,'an':1,'of':1,'to':1,'and':1,'in':1,'is':1,'for':1,'on':1,'with':1};
function topKeys(text){const f={};toks(text).forEach(t=>{if(t.length<2||STOP[t])return;f[t]=(f[t]||0)+1;});return Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,8).map(x=>x[0]);}
function drawGraph(){
  const svg=document.getElementById('graph');const W=svg.clientWidth||800,H=svg.clientHeight||500;svg.setAttribute('viewBox','0 0 '+W+' '+H);
  if(!DOCS.length){svg.innerHTML='<text x="'+(W/2)+'" y="'+(H/2)+'" fill="#6b7180" text-anchor="middle" font-size="14">知識庫是空的</text>';return;}
  const nodes=DOCS.map((d,i)=>({d,x:W/2+Math.cos(i/DOCS.length*6.283)*Math.min(W,H)*0.33,y:H/2+Math.sin(i/DOCS.length*6.283)*Math.min(W,H)*0.33}));
  let edges='';for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const shared=(nodes[i].d.keys||[]).filter(k=>(nodes[j].d.keys||[]).includes(k));if(shared.length>=2){edges+='<line x1="'+nodes[i].x+'" y1="'+nodes[i].y+'" x2="'+nodes[j].x+'" y2="'+nodes[j].y+'" stroke="#2a4270" stroke-width="1.2"/>';}}
  let n='';nodes.forEach(nd=>{n+='<g style="cursor:pointer" onclick="openDoc(\''+nd.d.id+'\')"><circle cx="'+nd.x+'" cy="'+nd.y+'" r="10" fill="#4f8cff"/><text x="'+nd.x+'" y="'+(nd.y-16)+'" fill="#eef0f6" text-anchor="middle" font-size="12">'+esc(nd.d.title.slice(0,14))+'</text></g>';});
  svg.innerHTML=edges+n;
}

/* ---------- render docs / tabs ---------- */
function renderDocs(){const q=(document.getElementById('q').value||'').toLowerCase();const list=document.getElementById('doclist');const fd=DOCS.filter(d=>!q||d.title.toLowerCase().includes(q)||d.text.toLowerCase().includes(q));list.innerHTML=fd.length?fd.map(d=>'<div class="doc" onclick="openDoc(\''+d.id+'\')"><div class="t">'+esc(d.title)+'</div><div class="m"><span>'+(d.chunks?d.chunks.length:0)+' 段・'+({paste:'貼上',file:'檔案',url:'網址'}[d.source]||d.source||'')+'</span><span class="del" onclick="event.stopPropagation();removeDoc(\''+d.id+'\')">🗑</span></div></div>').join(''):'<div class="empty" style="padding:24px;font-size:13px">還沒有知識，按上面「＋ 新增知識」。</div>';}
async function removeDoc(id){if(!confirm('刪除這份知識？'))return;await delDoc(id);DOCS=await all();renderDocs();}
function openDoc(id){const d=DOCS.find(x=>x.id===id);if(!d)return;tab('doc');document.getElementById('docview').innerHTML='<h2>'+esc(d.title)+'</h2><div class="src">來源：'+esc(d.source||'')+'　·　'+(d.keys||[]).map(k=>'<span class="tag">'+esc(k)+'</span>').join('')+'</div><pre>'+esc(d.text)+'</pre>';}
function tab(t){['chat','doc','graph'].forEach(x=>{document.getElementById('v-'+x).classList.toggle('hidden',x!==t);document.getElementById('tab-'+x).classList.toggle('on',x===t);});}
function show(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- init ---------- */
(async function(){DB=await idb();DOCS=await all();renderDocs();llmBadge();})();
</script>
